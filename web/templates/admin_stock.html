<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abastecer Prateleiras - Modo Locadora</title>
    <!-- Google Fonts: Press Start 2P -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <!-- NES.css CDN -->
    <link href="https://unpkg.com/nes.css@2.3.0/css/nes.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/retro.css">
    <style>
        body {
            font-family: 'Press Start 2P', cursive;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container-wrapper {
            max-width: 800px;
            width: 100%;
        }
        .admin-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .input-group {
            margin-bottom: 1rem;
        }
        .search-results {
            margin-top: 2rem;
        }
        .search-item {
            margin-bottom: 15px;
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }
        .search-item img {
            width: 80px;
            border: 1px solid #333;
        }
        .search-form {
            flex-grow: 1;
        }
        .nes-textarea {
            font-size: 8px !important;
        }
    </style>
</head>
<body>
    <div class="container-wrapper">
        <header class="admin-header">
            <h2 class="pixel-aligned-title">ABASTECER PRATELEIRAS</h2>
            <p class="pixel-aligned-subtitle">[INTERFACE DO TIO DA LOCADORA]</p>
        </header>

        <div class="forum-block">
            <header class="forum-header">
                <span>[ADICIONAR NOVO LOTE]</span>
                <span style="font-size: 8px;">ESTOQUE</span>
            </header>
            <div class="forum-body">
                <form action="/admin/stock" method="GET">
                    <div class="input-group nes-field">
                        <label for="magazine">Revista / Edição</label>
                        <input type="text" id="magazine" name="magazine" class="nes-input" value="{{.Magazine}}" placeholder="Ex: Super Game Power #45">
                    </div>
                    <div class="input-group nes-field">
                        <label for="q">Buscar Jogo no Acervo Global (IGDB)</label>
                        <input type="text" id="q" name="q" class="nes-input" value="{{.Query}}" placeholder="Nome do jogo...">
                    </div>
                    <div style="text-align: right; margin-top: 1rem;">
                        <button type="submit" class="forum-btn">PESQUISAR</button>
                    </div>
                </form>
            </div>
        </div>

        {{if .Results}}
        <div class="search-results">
            {{range .Results}}
            <div class="forum-block">
                <header class="forum-header">
                    <span>{{.Name}}</span>
                    <span style="font-size: 8px;">ID: {{.ID}}</span>
                </header>
                <div class="forum-body search-item">
                    <img src="{{.Cover.URL}}" alt="{{.Name}}">
                    <form action="/admin/purchase" method="POST" class="search-form">
                        <input type="hidden" name="igdb_id" value="{{.ID}}">
                        <input type="hidden" name="title" value="{{.Name}}">
                        <input type="hidden" name="cover_url" value="{{.Cover.URL}}">
                        <input type="hidden" name="magazine" value="{{$.Magazine}}">

                        <div class="nes-field">
                            <label for="summary_{{.ID}}">Resumo para a Ficha do Jogo (PT-BR)</label>
                            <textarea id="summary_{{.ID}}" name="summary" class="nes-textarea" rows="3">{{.Summary}}</textarea>
                        </div>

                        <div style="text-align: right; margin-top: 1rem;">
                            <button type="submit" class="forum-btn">ADQUIRIR PARA A LOCADORA</button>
                        </div>
                    </form>
                </div>
            </div>
            {{end}}
        </div>
        {{end}}

        <div style="margin-top: 2rem; display: flex; justify-content: space-between;">
            <a href="/games" class="forum-btn">VOLTAR PARA A PRATELEIRA</a>
        </div>

        <p style="font-size: 8px; text-align: center; margin-top: 40px; color: #555;">© 1991-2026 Modo Locadora - Sob licença GPLv3. Criado pelo Tio da Locadora.</p>
    </div>
</body>
</html>
